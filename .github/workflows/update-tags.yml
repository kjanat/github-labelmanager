name: Update Version Tags

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag with v prefix (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  update-tags:
    name: Update version tags
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Update Tags
        uses: cssnr/update-version-tags-action@v2
        with:
          tag: ${{ inputs.version }}
          major: true
          minor: true
